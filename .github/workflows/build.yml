name: AdvancedNPCS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Compilar AdvancedNPCS Premium

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar con Maven
        run: mvn clean package -B

      - name: Verificar errores
        if: failure()
        run: echo "Hay errores en el codigo. Revisa los logs arriba."

      - name: Subir el JAR compilado
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AdvancedNPCS-Premium
          path: target/AdvancedNPCS-*.jar

      - name: Mensaje de exito
        if: success()
        run: |
          echo "╔══════════════════════════════════════╗"
          echo "║   AdvancedNPCS Premium               ║"
          echo "║   Compilado correctamente            ║"
          echo "║   Creado por soyadrianyt001          ║"
          echo "╚══════════════════════════════════════╝"
